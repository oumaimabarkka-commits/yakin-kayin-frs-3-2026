<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Carte Fournisseurs Île-de-France</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
#map{ height:600px; }
.filters{ margin-bottom:15px; background:#f4f4f4; padding:10px; border-radius:5px; }
input, select{ margin-right:10px; padding:5px; }
.header{ display:flex; align-items:center; gap:15px; background:#f8f8f8; padding:10px; border-radius:8px; margin-bottom:10px; }
.legend{ background:white; padding:10px; border-radius:8px; box-shadow:0 0 5px rgba(0,0,0,0.3); line-height:25px; }
.legend span:hover{ background:#eee; cursor:pointer; }
</style>
</head>
<body>

<div class="header">
  <img src="logo.png" width="100">
  <h2>Carte Fournisseurs Île-de-France</h2>
</div>

<div class="filters">
Fournisseur : <select id="filtreNom"><option value="">Tous</option></select>
Ville : <select id="filtreVille"><option value="">Toutes</option></select>
CP : <select id="filtreCP"><option value="">Tous</option></select>
Produit : <select id="filtreProduit"><option value="">Tous</option></select>
Distance (km) :
<input type="range" id="filtreDistance" min="0" max="2000" step="10" value="0" oninput="updateDistanceValue()">
<span id="distanceValue">0 km</span>
<button onclick="filtrer()">Filtrer</button>
<button onclick="resetMap()">Reset</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<script>
// Carte
var ileDeFranceBounds=[[48.0,1.5],[49.2,3.5]];
var map=L.map('map',{maxBounds: ileDeFranceBounds,maxBoundsViscosity:1}).setView([48.85,2.35],10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{ attribution:'© OpenStreetMap' }).addTo(map);
L.rectangle(ileDeFranceBounds,{ color:"red", weight:4, fill:false }).addTo(map);

var markers=[];
var fournisseursSet = new Set();
var villesSet = new Set();
var cpsSet = new Set();
var produitsSet = new Set();
var rayonCircle = null;

// Icônes
function getIcon(color){
return new L.Icon({
iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-'+color+'.png',
shadowUrl:'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
iconSize:[25,41],
iconAnchor:[12,41]
});
}

// Fournisseurs et icônes
var fournisseurIcons = {
  "Loxam": getIcon("blue"),
  "Point P": getIcon("red"),
  "Raboni": getIcon("green"),
  "Cemex": getIcon("orange"),
  "CAUPAMAT CADENZ": getIcon("violet"),
  "Tersen": getIcon("yellow"),
  "pum": getIcon("black"),
  "YPREMA": getIcon("grey"),
  "Fransbonhomme": getIcon("blue"),
  "BSM": getIcon("red"),
  "SODEXTRA": getIcon("green"),
  "COLBER": getIcon("orange"),
  "SOL 78": getIcon("grey"),
  "SPME": getIcon("blue"),
  "VIACOV": getIcon("orange"),
  "Bouvelot TP": getIcon("black"),
  "CHEUTIN": getIcon("violet"),
  "GO POMPE": getIcon("green"),
  "SNB": getIcon("blue"),
  "EVA INDUSTRIES": getIcon("red"),
  "EVO LOCATION": getIcon("green"),
  "UTD": getIcon("orange"),
  "SCIABBARRASI RENT": getIcon("violet"),
  "LM DISTRIBUTION": getIcon("yellow"),
  "IDF MARQUAGE": getIcon("grey"),
  "EUROPIERRE": getIcon("blue"),
  "RFM": getIcon("red"),
  "ATPL CASELAS": getIcon("green")
};
var defaultIcon = getIcon("grey");

// Liste fournisseurs pour la légende
var fournisseurs = [
  "🔵 Loxam","🔴 Point P","🟢 Raboni","🟠 Cemex","🟣 CAUPAMAT CADENZ",
  "🟡 Tersen","⚫ pum","⚪ YPREMA","🔵 Fransbonhomme","🔴 BSM",
  "🟢 SODEXTRA","🟠 COLBER","⚪ SOL 78","🔵 SPME","🟠 VIACOV",
  "⚫ Bouvelot TP","🟣 CHEUTIN","🟢 GO POMPE","🔵 SNB","🔴 EVA INDUSTRIES",
  "🟢 EVO LOCATION","🟠 UTD","🟣 SCIABBARRASI RENT","🟡 LM DISTRIBUTION",
  "⚪ IDF MARQUAGE","🔵 EUROPIERRE","🔴 RFM","🟢 ATPL CASELAS"
];

// Normalisation
function normalize(str){return str ? str.normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim().toLowerCase() : "";}

// Charger CSV
fetch("./data.csv")
.then(r => r.text())
.then(text => {
Papa.parse(text,{
header:true,
skipEmptyLines:true,
complete:function(results){
results.data.forEach(row=>{
var cleanRow={};
for(let key in row){ cleanRow[normalize(key)] = row[key]; }
row = cleanRow;

var lat = parseFloat(row["latitude (fournisseur)"]?.replace(",", "."));
var lng = parseFloat(row["longitude (fournisseur)"]?.replace(",", "."));
if (isNaN(lat) || isNaN(lng)) return;

var fournisseur = row["fournisseur"]?.trim();
var ville = row["ville"]?.trim();
var cp = row["cp"]?.trim();
var produit = row["produit"]?.trim();

if(fournisseur) fournisseursSet.add(fournisseur);
if(ville) villesSet.add(ville);
if(cp) cpsSet.add(cp);
if(produit) produitsSet.add(produit);

var popup = `
<b>Fournisseur :</b> ${fournisseur||""}<br>
<b>Agence :</b> ${row["nom de l'agence"]||""}<br>
<b>Adresse :</b> ${row["adresse complete"]||""}<br>
<b>CP :</b> ${cp||""}<br>
<b>Ville :</b> ${ville||""}<br>
<b>Pays :</b> ${row["pays"]||""}<br>
<b>Email :</b> ${row["email"]||""}<br>
<b>Produit :</b> ${produit||""}
`;

var iconChoisie = fournisseurIcons[fournisseur] || defaultIcon;
var marker = L.marker([lat,lng], {icon: iconChoisie}).addTo(map).bindPopup(popup);
marker.data = row;
markers.push(marker);
});

remplirSelect("filtreNom", fournisseursSet);
remplirSelect("filtreVille", villesSet);
remplirSelect("filtreCP", cpsSet);
remplirSelect("filtreProduit", produitsSet);
}
});
});

// Remplir select
function remplirSelect(id,set){
var select = document.getElementById(id);
Array.from(set).sort().forEach(v=>{
var opt = document.createElement("option");
opt.value=v;
opt.textContent=v;
select.appendChild(opt);
});
}

// Afficher valeur distance
function updateDistanceValue(){
var d = document.getElementById("filtreDistance").value;
document.getElementById("distanceValue").innerText = d+" km";
}

// Haversine distance
function calculDistance(lat1, lon1, lat2, lon2){
var R = 6371;
var dLat = (lat2-lat1)*Math.PI/180;
var dLon = (lon2-lon1)*Math.PI/180;
var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
        Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
        Math.sin(dLon/2)*Math.sin(dLon/2);
var c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
return R*c;
}

// Filtrer
function filtrer(){
  var nom = normalize(document.getElementById("filtreNom").value);
  var ville = normalize(document.getElementById("filtreVille").value);
  var cp = normalize(document.getElementById("filtreCP").value);
  var produit = normalize(document.getElementById("filtreProduit").value);
  var distanceMax = parseFloat(document.getElementById("filtreDistance").value);

  var centreLat=null;
  var centreLng=null;

  if(ville){
      for (let marker of markers){
          var data = marker.data;
          if(normalize(data["ville"]) === ville){
              centreLat = parseFloat(data["latitude ville"]?.replace(",", "."));
              centreLng = parseFloat(data["longitude ville"]?.replace(",", "."));
              break;
          }
      }
  }

  if(rayonCircle){ map.removeLayer(rayonCircle); rayonCircle=null; }

  if(distanceMax > 0 && centreLat != null && centreLng != null){
      rayonCircle = L.circle([centreLat, centreLng], {radius: distanceMax*1000, color:'blue', fill:false}).addTo(map);
      map.fitBounds(rayonCircle.getBounds());
  }

  markers.forEach(marker=>{
      var data = marker.data;
      var match = true;

      if(nom && !normalize(data["fournisseur"]).includes(nom)) match = false;
      if(cp && !normalize(data["cp"]).includes(cp)) match = false;
      if(produit && !normalize(data["produit"]).includes(produit)) match = false;

      if(centreLat != null && centreLng != null && distanceMax > 0){
          var lat = parseFloat(data["latitude (fournisseur)"]?.replace(",", "."));
          var lng = parseFloat(data["longitude (fournisseur)"]?.replace(",", "."));
          var dist = calculDistance(centreLat, centreLng, lat, lng);
          if(dist > distanceMax) match = false;
      } 
      else if(ville && distanceMax == 0 && normalize(data["ville"]) !== ville){
          match = false;
      }

      if(match) marker.addTo(map);
      else map.removeLayer(marker);
  });
}

// Reset
function resetMap(){ location.reload(); }

// Légende
var legend = L.control({position:'bottomright'});
legend.onAdd=function(){
var div = L.DomUtil.create('div','legend');
div.innerHTML = "<b>Fournisseurs</b><br>";
fournisseurs.forEach(f=>{
  var span = document.createElement("span");
  span.innerHTML = f + "<br>";
  span.style.cursor = "pointer";
  span.onclick = ()=>{
      var nomFournisseur = f.substring(2).trim(); // enlève l’emoji
      document.getElementById("filtreNom").value = nomFournisseur;
      filtrer();
  };
  div.appendChild(span);
});
return div;
};
legend.addTo(map);

</script>
</body>
</html>
